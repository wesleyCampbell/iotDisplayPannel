syntax = "proto3";

package com.projectganymede.iot;

import "lib/google/type/date.proto";

option java_multiple_files = true;
option java_package = "api.habits";
option java_outer_classname = "HabitHistoryAPI";

//
// ======================= FULL DATA OBJECTS ==========================
//

message HabitHistory {
	uint64 history_id = 1;
	uint64 habit_id = 2;
	google.type.Date completion_date = 3;
	bool completed = 4;
	string notes = 5;
}

//
// =========================== API REQUESTS =============================
// 

// Get HabitHistory entry from a unique identifier
message GetHabitHistoryRequest {
	uint64 history_id = 1;
}

message GetHabitHistoryResponse {
	HabitHistory history = 1;
}

// Get all HabitHistory entries from a given date range
message ListHabitHistoryByDateRequest {
	google.type.Date start_date = 1;
	google.type.Date end_date = 2;
}

message ListHabitHistoryByDateResponse {
	repeated HabitHistory history_list = 1;	
}

// Get all HabitHistory entries from a given habit 

message ListHabitHistoryByHabitRequest {
	uint64 habit_id = 1;
}

message ListHabitHistoryByHabitResponse {
	repeated HabitHistory history_list = 1;
}

// Get all completed HabitHistory entries on a date range

message ListCompletedHabitHistoryByDateRequest {
	google.type.Date start_date = 1;
	google.type.Date end_date = 2;
}

message ListCompletedHabitHistoryByDateResponse {
	repeated HabitHistory history_list = 1;
}

// Get all failed HabitHistory entries on a date range

message ListFailedHabitHistoryByDateRequest {
	google.type.Date start_date = 1;
	google.type.Date end_date = 2;
}

message ListFailedHabitHistoryByDateResponse {
	repeated HabitHistory history_list = 1;
}

// Get all completed habit history from a given habit

message ListCompletedHabitHistoryByHabitRequest {
	uint64 habit_id = 1;
}

message ListCompletedHabitHistoryByHabitResponse {
	repeated HabitHistory history_list = 1;
}

// Get all failed habit history entires from a given habit

message ListFailedHabitHistoryByHabitRequest {
	uint64 habit_id = 1;
}

message ListFailedHabitHistoryByHabitResponse {
	repeated HabitHistory history_list = 1;
}

message ListHabitHistoryAPIRequest {
	oneof payload {
		GetHabitHistoryRequest get_history_entry = 10;
		ListHabitHistoryByDateRequest list_history_by_date = 11;
		ListHabitHistoryByHabitRequest list_history_by_habit = 12;
		ListCompletedHabitHistoryByDateRequest list_completed_history_by_date = 13;
		ListFailedHabitHistoryByDateRequest list_failed_history_by_date = 14;
		ListCompletedHabitHistoryByHabitRequest list_completed_history_by_habit = 15;
		ListFailedHabitHistoryByHabitRequest list_failed_history_by_habit = 16;
	}
}

// Change the completion status of a given habit
message MarkHistoryCompletionStateRequest {
	uint64 history_id = 1;
	bool status = 2;
}
message MarkHistoryCompletionStateResponse {
}

// Change the notes of a given habit history entry
message UpdateHabitHistoryNotesRequest {
	uint64 history_id = 1;
	string new_notes = 2;
}
message  UpdateHabitHistoryNotesResponse {
}

message UpdateHabitHistoryAPIRequest {
	oneof payload {
		MarkHistoryCompletionStateRequest change_completion_state = 10;
		UpdateHabitHistoryNotesRequest change_notes = 11;
	}
}

// Create a new habit history entry
message CreateHabitHistoryRequest {
	uint64 habit_id = 1;
	bool completed = 2;
	string notes = 3;
}
message CreateHabitHistoryDatedRequest {
	uint64 habit_id = 1;
	google.type.Date completion_date = 2;
	bool completed = 3;
	string notes = 4;
}
message CreateHabitHistoryAPIRequest {
	oneof payload {
		CreateHabitHistoryRequest create_history= 10;
		CreateHabitHistoryDatedRequest create_history_dated = 11;
	}
}
message CreateHabitHistoryResponse {
	uint64 history_id = 1;
}

// Delete a habit history entry
message DeleteHistoryEntryRequest {
	uint64 history_id = 1;
}
message DeleteHistoryEntryResponse {
}

message DeleteHabitHistoryRequest {
	uint64 habit_id = 1;
}
message DeleteHabitHistoryResponse {
}

message DeleteHistoryEntriesRequest {
	google.type.Date completion_date = 1;
}
message DeleteHistoryEntriesResponse {
}

message DeleteHabitHistoryAPIRequest {
	oneof payload {
		DeleteHistoryEntryRequest delete_history_entry = 10;
		DeleteHabitHistoryRequest delete_habit_history = 11;
		DeleteHistoryEntriesRequest delete_history_entries = 12;
	}
}
