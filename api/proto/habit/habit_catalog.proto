syntax = "proto3";

package com.projectganymede.iot;

option java_multiple_files = true;
option java_package = "api.habits";
option java_outer_classname = "HabitCatalogAPI";

// 
// =================== FULL DATA OBJECTS =====================
//

message HabitEntry {
	uint64 habit_id = 1;
	string name = 2;
	string description = 3;
	bool active = 5;
}

//
// ======================== API REQUESTS =======================
//

// Get a HabitEntry by its id

message GetHabitEntryRequest {
	uint64 habit_id = 1;
}
message GetHabitEntryResponse {
	HabitEntry habit_data = 1;
}

// Get the entire habit catalog
message GetHabitCatalogRequest {
	uint64 number_limit = 1;
}
message GetHabitCatalogResponse {
	repeated HabitEntry habit_data_list = 1;
}	

// Get all active habits from the catalog
message GetActiveHabitsRequest {
}
message GetActiveHabitsResponse {
	repeated HabitEntry habit_data_list = 1;
}

// Get all in-active habits from the catalog
message GetInactiveHabitsRequest {
}
message GetInactiveHabitsResponse {
	repeated HabitEntry habit_data_list = 1;
}

// Delete a habit entry
message DeleteHabitEntryRequest {
	uint64 habit_id = 1;
}

message DeleteHabitEntryResponse {
}

// Create a habit entry
message CreateHabitEntryRequest {
	string name = 1;
	string description = 2;
	bool active = 3;
}

message CreateHabitEntryResponse {
	
}

// The actual get habits API request
message GetHabitAPIRequest {
	oneof payload {
		GetHabitEntryRequest get_habit = 10;
		GetHabitCatalogRequest get_all_habits = 11;
		GetActiveHabitsRequest get_active_habits = 12;
		GetInactiveHabitsRequest get_inactive_habits = 13;
	}
}
